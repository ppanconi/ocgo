name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build archive
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="${GITHUB_REF_NAME:-dev}"
          dist_dir="dist"
          archive_base="ocgo_${version}_${GOOS}_${GOARCH}"
          binary_name="ocgo"

          mkdir -p "${dist_dir}/${archive_base}"
          go build -trimpath -ldflags="-s -w" -o "${dist_dir}/${archive_base}/${binary_name}" .
          cp README.md LICENSE "${dist_dir}/${archive_base}/"

          tar -C "${dist_dir}" -czf "${dist_dir}/${archive_base}.tar.gz" "${archive_base}"
          shasum -a 256 "${dist_dir}/${archive_base}.tar.gz" > "${dist_dir}/${archive_base}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ocgo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten release assets
        run: |
          mkdir -p release-assets
          find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} release-assets/ \;

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
